---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}
    <p class="meta">{{ page.date | date_to_string }}</p>
  </header>

  <div id="post">
{{ content }}
  </div>
</article>
