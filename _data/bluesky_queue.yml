# Bluesky post queue — drafts ready to send.
#
# Recommended cadence: one per day, alternating heavy MAS-series pieces with
# Zabriskie/perspective posts so the feed stays varied for new readers.
#
# Workflow:
#   1. Pick the next entry (top of the list)
#   2. Edit the `text` if you want a different angle
#   3. Post via the MCP `post` tool (auto-attaches OG card after the
#      Claude Code restart that picks up the new MCP build)
#   4. Run: python scripts/bluesky_log.py mark <post_url> --bluesky-url <bsky-url>
#   5. Move the entry below `posted:` (or delete it)

queue:
  - post_url: https://christophermeiklejohn.com/ai/agents/mas-series/2026/04/25/mas-series-02-the-vocabulary.html
    title: "Getting Up to Speed on Multi-Agent Systems, Part 2: The Vocabulary"
    notes: "Continues the series. Hook = 'reading without vocab is hopeless.'"
    text: |-
      Reading multi-agent papers without the shared vocabulary is hopeless. Three surveys did the consolidation. Part 2 walks through them so any paper becomes legible — what it is and isn't claiming.

      https://christophermeiklejohn.com/ai/agents/mas-series/2026/04/25/mas-series-02-the-vocabulary.html

  - post_url: https://christophermeiklejohn.com/ai/agents/distributed/zabriskie/2026/03/30/multi-agent-systems-have-a-distributed-systems-problem.html
    title: "Multi-Agent Systems Have a Distributed Systems Problem"
    notes: "Foundational. Concrete migration-collision hook. Bridges the MAS series and Zabriskie."
    text: |-
      Two Claude Code instances stepped on each other's database migrations. A lost update from the 1970s, replayed in 2025.

      https://christophermeiklejohn.com/ai/agents/distributed/zabriskie/2026/03/30/multi-agent-systems-have-a-distributed-systems-problem.html

  - post_url: https://christophermeiklejohn.com/ai/agents/mas-series/2026/04/26/mas-series-03-wave-one.html
    title: "Getting Up to Speed on Multi-Agent Systems, Part 3: Wave 1"
    notes: "Names the canonical five papers. Dense but well-known names = high click rate."
    text: |-
      When someone says "I read the multi-agent papers," they usually mean five from 2023: CAMEL, GenAgents, ChatDev, MetaGPT, AutoGen. Part 3 walks through what each builds and where they quietly disagree.

      https://christophermeiklejohn.com/ai/agents/mas-series/2026/04/26/mas-series-03-wave-one.html

  - post_url: https://christophermeiklejohn.com/ai/agents/reliability/zabriskie/2026/04/08/cursor-agents-caucus-v1.html
    title: "Caucus V1: Cursor Background Agents and a Multi-Agent Workflow That Actually Loops"
    notes: "Capstone Zabriskie systems post. 'Multi-agent that's actually a distsys primitive.'"
    text: |-
      Built a multi-agent runtime on Cursor's background agents. Permits, proofs, scope-checked merges. Most multi-agent systems are roleplay; this one's closer to a distsys primitive.

      https://christophermeiklejohn.com/ai/agents/reliability/zabriskie/2026/04/08/cursor-agents-caucus-v1.html

  - post_url: https://christophermeiklejohn.com/ai/agents/mas-series/2026/04/27/mas-series-04-wave-two.html
    title: "Getting Up to Speed on Multi-Agent Systems, Part 4: Wave 2"
    notes: "Names the canonical wave-2 papers. Pairs with Part 3."
    text: |-
      Wave 1 assumed coordination was the hard problem. Wave 2 asks why it breaks. MAST documents the failure modes, MAS-FIRE injects them, Silo-Bench finds the limits of what coordination can fix. Part 4:

      https://christophermeiklejohn.com/ai/agents/mas-series/2026/04/27/mas-series-04-wave-two.html

  - post_url: https://christophermeiklejohn.com/ai/engineering/2026/04/01/software-engineering-is-becoming-civil-engineering.html
    title: "Software Engineering Is Becoming Civil Engineering"
    notes: "Most quotable / shareable. Broad take that pairs naturally with the next entry."
    text: |-
      Civil engineering separated structural design from craft 250 years ago. Bridges are designed so a welder doing their job can't bring them down. Software is making that shift now.

      https://christophermeiklejohn.com/ai/engineering/2026/04/01/software-engineering-is-becoming-civil-engineering.html

  - post_url: https://christophermeiklejohn.com/ai/verification/zabriskie/agents/2026/04/09/the-structural-engineers-other-job.html
    title: "The Structural Engineer's Other Job"
    notes: "Direct sequel to the Civil Engineering post — concrete bug taxonomy."
    text: |-
      Test passed. Review passed. Feature half-works. AI-generated code makes the structural engineer's other job — keeping the system robust to builders following directions — central.

      https://christophermeiklejohn.com/ai/verification/zabriskie/agents/2026/04/09/the-structural-engineers-other-job.html

